<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VMD OS</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0D1B2A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VMD OS">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --navy:   #0D1B2A;
  --blue:   #1565C0;
  --blue2:  #1976D2;
  --cyan:   #00B0FF;
  --green:  #00C853;
  --green2: #2E7D32;
  --orange: #FF6D00;
  --red:    #D32F2F;
  --purple: #6A1B9A;
  --white:  #FFFFFF;
  --bg:     #F0F4F8;
  --card:   #FFFFFF;
  --text:   #1A2332;
  --text2:  #546E7A;
  --border: #E0E7EF;
  --shadow: 0 2px 8px rgba(13,27,42,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

/* ── LOGIN ─────────────────────────────────────────────── */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-card{background:var(--card);border-radius:16px;padding:32px 28px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(13,27,42,.12);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .logo-text{font-size:28px;font-weight:800;color:var(--blue);letter-spacing:-1px;}
.login-logo .logo-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.form-group input,.form-group select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;color:var(--text);background:var(--bg);outline:none;transition:border .2s;}
.form-group input:focus,.form-group select:focus{border-color:var(--blue);}
.btn-login{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:background .2s;}
.btn-login:hover{background:var(--blue2);}
.login-hint{font-size:11px;color:var(--text2);text-align:center;margin-top:16px;line-height:1.6;}

/* ── APP SHELL ─────────────────────────────────────────── */
#app-shell{display:none;min-height:100vh;flex-direction:column;}
.topbar{background:var(--navy);color:#fff;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar .logo{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.5px;}
.topbar .role-badge{font-size:10px;background:rgba(255,255,255,.15);padding:3px 8px;border-radius:20px;font-weight:600;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.notif-btn{position:relative;background:none;border:none;color:#fff;cursor:pointer;padding:4px;font-size:20px;line-height:1;}
.notif-count{position:absolute;top:-2px;right:-2px;background:var(--red);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;}

/* ── NAV TABS ──────────────────────────────────────────── */
.nav-tabs{background:var(--card);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{flex-shrink:0;padding:12px 16px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
.nav-tab.active{color:var(--blue);border-bottom-color:var(--blue);}

/* ── APP BODY + SIDEBAR ────────────────────────────────── */
.app-body{display:flex;flex:1;min-height:0;}
.sidebar{width:240px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);padding:14px;overflow-y:auto;position:sticky;top:56px;height:calc(100vh - 56px);}
.sidebar-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.sb-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.sb-cal-month{font-size:13px;font-weight:700;color:var(--text);}
.sb-cal-nav{background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;}
.sb-cal-nav:hover{background:var(--bg);}
.sb-grid-days{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:2px;}
.sb-day-name{text-align:center;font-size:9px;font-weight:600;color:var(--text2);padding:2px 0;}
.sb-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.sb-cell{height:28px;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:11px;font-weight:500;transition:background .15s;position:relative;}
.sb-cell:not(.empty):hover{background:var(--bg);}
.sb-cell.today{background:var(--blue);color:#fff;font-weight:700;}
.sb-cell.has-event::after{content:'';position:absolute;bottom:2px;width:4px;height:4px;border-radius:50%;background:var(--orange);}
.sb-cell.today.has-event::after{background:#fff;}
.sb-cell.empty{cursor:default;}
.sb-cell.other-month{color:var(--border);}
.sb-divider{height:1px;background:var(--border);margin:12px 0;}
.sb-event{padding:7px 8px;border-radius:8px;margin-bottom:6px;cursor:pointer;transition:background .15s;}
.sb-event:hover{background:var(--bg);}
.sb-event-type{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;}
.sb-event-client{font-size:12px;font-weight:600;color:var(--text);margin-top:1px;}
.sb-event-time{font-size:10px;color:var(--text2);}
.sb-event.today-ev{background:#EBF5FF;border-left:3px solid var(--blue);}
.sb-event.overdue-ev{background:#FFF0F0;border-left:3px solid var(--red);}
.sb-add-btn{width:100%;padding:8px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px;}
.sb-add-btn:hover{background:var(--blue2);}
.sb-ev-row{display:flex;align-items:flex-start;gap:8px;}
.sb-ev-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.sb-ev-info{flex:1;min-width:0;}
.sb-ev-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;}
.sb-ev-tag{font-size:9px;font-weight:600;padding:2px 6px;border-radius:10px;}
.type-tag{background:rgba(21,101,192,.12);color:var(--blue);}
.time-tag{background:rgba(0,200,83,.12);color:var(--green2);}
.date-tag{background:var(--bg);color:var(--text2);}
.sb-wa{padding:4px 8px;background:#25D366;color:#fff;border-radius:12px;font-size:9px;font-weight:700;text-decoration:none;flex-shrink:0;margin-top:2px;}
.sb-wa:hover{background:#1da851;}
/* ── BOTTOM NAV (mobile only) ──────────────────────────── */
.bottom-nav{display:none;}
@media(max-width:640px){
  /* Hide top nav tabs on mobile — use bottom nav instead */
  .nav-tabs{display:none;}

  /* Bottom navigation bar */
  .bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:var(--card);border-top:1px solid var(--border);
    z-index:150;height:60px;box-shadow:0 -2px 12px rgba(0,0,0,.08);
  }
  .bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:none;color:var(--text2);font-size:9px;font-weight:600;padding:6px 2px;transition:color .2s;}
  .bn-item.active{color:var(--blue);}
  .bn-icon{font-size:20px;line-height:1;}
  .bn-item.active .bn-icon{transform:scale(1.1);}

  /* Sidebar: HIDDEN by default on mobile, slides up on demand */
  .sidebar{
    display:none !important;
    position:fixed;bottom:60px;left:0;right:0;
    width:100%;max-height:75vh;overflow-y:auto;
    background:var(--card);border-top:1px solid var(--border);
    border-right:none;padding:16px;
    z-index:140;box-shadow:0 -4px 20px rgba(0,0,0,.15);
    border-radius:20px 20px 0 0;
  }
  .sidebar.open{display:block !important;}
  .sidebar-drag{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}

  /* Show cal toggle button in topbar */
  .cal-toggle-btn{display:flex;}

  /* Main content padding for bottom nav */
  .main{padding-bottom:76px;}
  .app-body{flex-direction:column;}

  /* Bigger touch targets */
  .status-btn{padding:7px 12px;font-size:12px;}
  .lead-item{padding:14px;}
  .sb-grid .sb-cell{height:30px;font-size:11px;}
  .stat-grid{grid-template-columns:repeat(2,1fr);}
}
/* Hide cal-toggle on desktop */
.cal-toggle-btn{display:none;background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:4px 8px;}

/* ── MAIN CONTENT ──────────────────────────────────────── */
.main{flex:1;padding:16px;max-width:860px;width:100%;overflow-x:hidden;}

/* ── CARDS ─────────────────────────────────────────────── */
.card{background:var(--card);border-radius:12px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px;}
.card-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.card-header .card-title{margin-bottom:0;}

/* ── STAT GRID ─────────────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px;}
.stat-card{background:var(--card);border-radius:12px;padding:14px;box-shadow:var(--shadow);text-align:center;}
.stat-card .stat-val{font-size:26px;font-weight:800;line-height:1;margin-bottom:4px;}
.stat-card .stat-label{font-size:11px;color:var(--text2);font-weight:500;}
.stat-card .stat-delta{font-size:10px;margin-top:3px;font-weight:600;}
.stat-card.blue .stat-val{color:var(--blue);}
.stat-card.green .stat-val{color:var(--green2);}
.stat-card.orange .stat-val{color:var(--orange);}
.stat-card.red .stat-val{color:var(--red);}

/* ── ALERTS ────────────────────────────────────────────── */
.alert-list{display:flex;flex-direction:column;gap:8px;}
.alert-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;font-size:13px;}
.alert-item.red{background:#FFEBEE;border-left:3px solid var(--red);}
.alert-item.orange{background:#FFF3E0;border-left:3px solid var(--orange);}
.alert-item.blue{background:#E3F2FD;border-left:3px solid var(--blue);}
.alert-item.green{background:#E8F5E9;border-left:3px solid var(--green);}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.alert-text{line-height:1.4;}
.alert-text strong{display:block;margin-bottom:1px;}
.alert-text span{color:var(--text2);font-size:12px;}

/* ── FILTER BAR ────────────────────────────────────────── */
.filter-bar{display:flex;gap:8px;margin-bottom:10px;}

/* ── CALENDAR ──────────────────────────────────────────── */
.cal-header{display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.cal-month{font-size:15px;font-weight:700;color:var(--text);}
.cal-grid-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
.cal-day-name{text-align:center;font-size:11px;font-weight:600;color:var(--text2);padding:4px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-cell{min-height:38px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:500;transition:background .15s;position:relative;}
.cal-cell:not(.empty):hover{background:var(--bg);}
.cal-cell.today{background:var(--blue);color:#fff;font-weight:700;}
.cal-cell.today .cal-dot{background:#fff;}
.cal-cell.empty{cursor:default;}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--orange);position:absolute;bottom:4px;}

/* ── EVENTS ────────────────────────────────────────────── */
.event-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.event-item:last-child{border-bottom:none;}
.event-item.overdue{background:#fff5f5;border-radius:8px;padding:10px;margin-bottom:4px;}
.event-item.today-event{background:#f0f7ff;border-radius:8px;padding:10px;margin-bottom:4px;}
.event-icon{font-size:20px;flex-shrink:0;}
.event-body{flex:1;min-width:0;}
.event-client{font-weight:600;font-size:13px;}
.event-meta{font-size:12px;color:var(--text2);margin-top:2px;}
.wa-btn{padding:5px 10px;background:var(--blue);color:#fff;border-radius:20px;font-size:11px;font-weight:700;text-decoration:none;flex-shrink:0;transition:background .15s;}
.wa-btn:hover{background:var(--blue2);}
.wa-btn.green{background:#25D366;}
.wa-btn.green:hover{background:#1da851;}
.btn-add-meeting{padding:8px 16px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;}
.filter-bar select{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);background:var(--card);outline:none;}
.filter-bar select:focus{border-color:var(--blue);}

/* ── LEAD LIST ─────────────────────────────────────────── */
.lead-list{display:flex;flex-direction:column;gap:8px;}
.lead-item{background:var(--card);border-radius:10px;padding:12px;box-shadow:var(--shadow);transition:transform .15s;}
.lead-item .lead-header{cursor:pointer;}
.lead-item:hover{transform:translateY(-1px);}
.lead-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.lead-name{font-weight:700;font-size:14px;}
.lead-status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;}
.lead-status.new{background:#E3F2FD;color:#1565C0;}
.lead-status.work{background:#E0F7FA;color:#00838F;}
.lead-status.testdrive{background:#E8F5E9;color:#2E7D32;}
.lead-status.kp{background:#F3E5F5;color:#6A1B9A;}
.lead-status.contract{background:#E8F5E9;color:#1B5E20;}
.lead-status.refused{background:#FFEBEE;color:#B71C1C;}
.lead-meta{display:flex;gap:12px;font-size:12px;color:var(--text2);flex-wrap:wrap;}
.lead-score{display:flex;align-items:center;gap:6px;margin-top:6px;}
.lead-actions{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.status-btns{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.status-btn{padding:4px 10px;border:1.5px solid var(--blue);border-radius:20px;font-size:11px;font-weight:600;color:var(--blue);background:transparent;cursor:pointer;transition:all .15s;}
.status-btn:hover{background:var(--blue);color:#fff;}
.status-btn.red-btn{border-color:var(--red);color:var(--red);}
.status-btn.red-btn:hover{background:var(--red);color:#fff;}
.score-bar-bg{flex:1;height:5px;background:#E0E7EF;border-radius:3px;}
.score-bar-fill{height:5px;border-radius:3px;transition:width .4s;}
.score-label{font-size:11px;font-weight:700;min-width:36px;text-align:right;}

/* ── MANAGER TABLE ─────────────────────────────────────── */
.manager-list{display:flex;flex-direction:column;gap:8px;}
.manager-row{background:var(--card);border-radius:10px;padding:12px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;}
.manager-rank{font-size:18px;font-weight:800;color:var(--text2);min-width:28px;text-align:center;}
.manager-rank.gold{color:#F9A825;}
.manager-rank.silver{color:#78909C;}
.manager-rank.bronze{color:#8D6E63;}
.manager-info{flex:1;}
.manager-name{font-weight:700;font-size:14px;margin-bottom:2px;}
.manager-stats{display:flex;gap:10px;font-size:11px;color:var(--text2);flex-wrap:wrap;}
.manager-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;}
.badge-legend{background:#FFF9C4;color:#F57F17;}
.badge-pro{background:#E8F5E9;color:#2E7D32;}
.badge-std{background:#E3F2FD;color:#1565C0;}
.badge-grow{background:#FFF3E0;color:#E65100;}
.badge-alert{background:#FFEBEE;color:#C62828;}
.manager-score-num{font-size:18px;font-weight:800;color:var(--blue);}

/* ── DEALER TABLE ──────────────────────────────────────── */
.dealer-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.dealer-card{background:var(--card);border-radius:10px;padding:12px;box-shadow:var(--shadow);}
.dealer-card .dc-name{font-weight:700;font-size:13px;margin-bottom:6px;}
.dealer-card .dc-city{font-size:11px;color:var(--text2);margin-bottom:8px;}
.dc-score-circle{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.dc-score-num{font-size:22px;font-weight:800;}
.dc-mini-stats{display:flex;gap:6px;flex-wrap:wrap;}
.dc-stat{font-size:10px;background:var(--bg);padding:3px 7px;border-radius:20px;color:var(--text2);}

/* ── SCORE RING ────────────────────────────────────────── */
.score-ring{position:relative;display:inline-flex;align-items:center;justify-content:center;}
.score-ring svg{transform:rotate(-90deg);}
.score-ring .ring-val{position:absolute;font-size:13px;font-weight:800;color:var(--text);}

/* ── NOTIFICATIONS PANEL ───────────────────────────────── */
#notif-panel{display:none;position:fixed;top:56px;right:0;width:320px;max-height:calc(100vh - 56px);background:var(--card);box-shadow:-4px 0 20px rgba(0,0,0,.12);z-index:200;overflow-y:auto;padding:16px;}
#notif-panel.open{display:block;}
.notif-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.notif-header h3{font-size:14px;font-weight:700;}
.notif-clear{font-size:12px;color:var(--blue);cursor:pointer;background:none;border:none;}
.notif-item{padding:10px;background:var(--bg);border-radius:8px;margin-bottom:8px;font-size:12px;line-height:1.5;border-left:3px solid var(--blue);}
.notif-item.red{border-left-color:var(--red);}
.notif-item.orange{border-left-color:var(--orange);}
.notif-item.green{border-left-color:var(--green2);}
.notif-item .notif-time{color:var(--text2);margin-top:3px;}

/* ── CSV UPLOAD ────────────────────────────────────────── */
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--blue);background:#E3F2FD;}
.upload-zone .upload-icon{font-size:32px;margin-bottom:8px;}
.upload-zone p{font-size:13px;color:var(--text2);}
.upload-zone .upload-hint{font-size:11px;color:var(--text2);margin-top:4px;}
#file-input{display:none;}

/* ── FUNNEL ────────────────────────────────────────────── */
.funnel{display:flex;flex-direction:column;gap:4px;}
.funnel-row{display:flex;align-items:center;gap:8px;}
.funnel-label{font-size:11px;color:var(--text2);min-width:90px;text-align:right;}
.funnel-bar-wrap{flex:1;height:22px;background:var(--bg);border-radius:4px;overflow:hidden;}
.funnel-bar{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#fff;transition:width .5s;}
.funnel-count{font-size:11px;font-weight:700;color:var(--text);min-width:36px;}

/* ── SECTION HEADER ────────────────────────────────────── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-title{font-size:16px;font-weight:700;}
.section-sub{font-size:12px;color:var(--text2);}
.btn-sm{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-outline{background:none;border:1.5px solid var(--border);color:var(--text2);}

/* ── TODAY TASKS ───────────────────────────────────────── */
.task-list{display:flex;flex-direction:column;gap:6px;}
.task-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg);border-radius:8px;}
.task-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.task-check.done{background:var(--green2);border-color:var(--green2);color:#fff;font-size:10px;}
.task-info{flex:1;}
.task-client{font-weight:600;font-size:13px;}
.task-action{font-size:11px;color:var(--text2);}
.task-time{font-size:11px;font-weight:600;color:var(--blue);flex-shrink:0;}
.task-urgent{color:var(--red);}

/* ── MODAL ─────────────────────────────────────────────── */

  return s;
}

  if (role !== 'manager' && role !== 'rop') { sidebar.style.display = 'none'; return; }

  if (sbYear === undefined) { sbYear = today.getFullYear(); sbMonth = today.getMonth(); }

  const daysInMonth = new Date(sbYear, sbMonth+1, 0).getDate();
  const startOffset = firstDay === 0 ? 6 : firstDay - 1;

  let cells = '';
  for (let i = 0; i < startOffset; i++) cells += `<div class="sb-cell empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${sbYear}-${String(sbMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds === todayStr;
    const hasEv = eventDates.has(ds);
    cells += `<div class="sb-cell ${isToday?'today':''} ${hasEv?'has-event':''}" onclick="showDayEvents('${ds}')" title="${ds}">${d}</div>`;
  }

  // Today + upcoming events
  const todayEv = allEvents.filter(e => e.date === todayStr);
  const upEv = allEvents.filter(e => e.date > todayStr).sort((a,b) => a.date.localeCompare(b.date)).slice(0,4);
  const overdueEv = allEvents.filter(e => e.date < todayStr).slice(-2);

  const typeIcon = t => t==='Встреча'?'🤝':t==='Тест-драйв'?'🚗':t==='КП'?'📄':'📞';

  const evHtml = ev => `<div class="sb-event ${ev._type}" onclick="showDayEvents('${ev.date}')">
    <div class="sb-ev-row">
      <span class="sb-ev-icon">${typeIcon(ev.type)}</span>
      <div class="sb-ev-info">
        <div class="sb-event-client">${ev.client}</div>
        <div class="sb-ev-tags">
          <span class="sb-ev-tag type-tag">${ev.type}</span>
          ${ev.time?`<span class="sb-ev-tag time-tag">🕐 ${ev.time}</span>`:''}
          <span class="sb-ev-tag date-tag">${ev._type==='today-ev'?'Сегодня':ev._type==='overdue-ev'?'⚠️ Просрочено':ev.date}</span>
        </div>
      </div>
      ${ev.phone?`<a class="sb-wa" href="https://wa.me/${(p=>p.startsWith('8')&&p.length===11?'7'+p.slice(1):p)(ev.phone.replace(/[^0-9]/g,''))}" target="_blank" onclick="event.stopPropagation()">WA</a>`:''}
    </div>
  </div>`;

  document.getElementById('sidebar-cal').innerHTML = `
    <div class="sidebar-title">📅 Календарь</div>
    <div class="sb-cal-header">
      <button class="sb-cal-nav" onclick="sbNav(-1)">‹</button>
      <span class="sb-cal-month">${monthNames[sbMonth]} ${sbYear}</span>
      <button class="sb-cal-nav" onclick="sbNav(1)">›</button>
    </div>
    <div class="sb-grid-days">${dayNames.map(d=>`<div class="sb-day-name">${d}</div>`).join('')}</div>
    <div class="sb-grid">${cells}</div>
    <button class="sb-add-btn" onclick="openMeetingModal()">+ Назначить встречу</button>
    ${overdueEv.length||todayEv.length||upEv.length ? `<div class="sb-divider"></div>` : ''}
    ${overdueEv.map(e => evHtml({...e,_type:'overdue-ev'})).join('')}
    ${todayEv.map(e => evHtml({...e,_type:'today-ev'})).join('')}
    ${upEv.map(e => evHtml({...e,_type:''})).join('')}
  `;
}
function sbNav(dir) {
  sbMonth += dir;
  if (sbMonth < 0) { sbMonth = 11; sbYear--; }
  if (sbMonth > 11) { sbMonth = 0; sbYear++; }
  renderSidebar();
}

function changeStatus(id, newStatus) {
  const lead = state.leads.find(l => l.id === id);
  if (!lead) return;
  lead.status = newStatus;
  lead.lastContact = new Date().toISOString().split('T')[0];
  saveLeads();
  buildNotifications();
  renderSidebar();
  renderApp();
  showToast(`✅ ${lead.client} → ${newStatus}`);
}

function doLogin() {
  const login = document.getElementById('login-input').value.trim();
  const pass  = document.getElementById('pass-input').value.trim();
  const u = USERS[login];
  if (!u || u.pass !== pass) { alert('Неверный логин или пароль'); return; }
  state.user = { ...u, login };
  state.filter = { status: '', manager: '' };
  saveSession(login);
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-shell').style.display = 'flex';
  document.getElementById('role-badge').textContent = ROLE_LABELS[u.role];
  document.getElementById('user-avatar').textContent = u.name[0];
  buildNotifications();
  renderSidebar();
  renderApp();
}

function doLogout() {
  if (!confirm('Выйти из системы?')) return;
  clearSession();
  state.user = null;
  state.currentTab = 0;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-shell').style.display = 'none';
}

function buildNotifications() {
  const role = state.user.role;
  const notifs = [];
  const myLeads = state.leads.filter(l => l.manager === state.user.name);

  if (role === 'manager') {
    const todayStr = new Date().toISOString().split('T')[0];
    const todayMeetings = (state.meetings||[]).filter(m => m.manager === state.user.name && m.date === todayStr);
    todayMeetings.forEach(m => {
      notifs.push({type:'green', text:`📅 Сегодня ${m.type}: <strong>${m.client}</strong>${m.time?' в '+m.time:''}`, time:m.time||'Сегодня'});
    });
    myLeads.filter(l => isOverdue(l) && l.status !== 'Контракт' && l.status !== 'Отказ').forEach(l => {
      notifs.push({type:'red', text:`⏰ Просрочено: <strong>${l.client}</strong> — ${l.nextAction}`, time:'Сейчас'});
    });
    myLeads.filter(l => !l.opd && l.status !== 'Отказ').forEach(l => {
      notifs.push({type:'orange', text:`📋 Нет ОПД: <strong>${l.client}</strong> — получи согласие`, time:'Сегодня'});
    });
    myLeads.filter(l => !l.modification && l.status !== 'Отказ').forEach(l => {
      notifs.push({type:'orange', text:`🔧 Не заполнена модификация: <strong>${l.client}</strong>`, time:'Сегодня'});
    });
  } else if (role === 'rop') {
    const myDealerLeads = state.leads.filter(l => l.dealer === state.user.dealer);
    const stuck = myDealerLeads.filter(l => l.status === 'В работе' && l.lastContact && (new Date() - new Date(l.lastContact)) > 2*24*3600*1000);
    if (stuck.length) notifs.push({type:'red', text:`🔴 ${stuck.length} лидов без активности более 2 дней`, time:'Сегодня'});
    const noContact = myDealerLeads.filter(l => !l.lastContact && l.status === 'Новый');
    if (noContact.length) notifs.push({type:'orange', text:`📞 ${noContact.length} новых лидов без первого контакта`, time:'Сегодня'});
    notifs.push({type:'blue', text:`📊 Ежедневный отчёт команды готов — конверсия 1.2%`, time:'18:00'});
  } else if (role === 'director') {
    const dcLeads = state.leads.filter(l => l.dealer === state.user.dealer);
    const noOpd = dcLeads.filter(l => !l.opd && l.status !== 'Отказ');
    if (noOpd.length) notifs.push({type:'red', text:`⚠️ Юридический риск: ${noOpd.length} лидов без ОПД в "${state.user.dealer}"`, time:'Сегодня'});
    notifs.push({type:'blue', text:`📈 Ежедневный отчёт ДЦ готов — скоринг РЛ: 58%`, time:'18:00'});
    notifs.push({type:'green', text:`🏆 Ваш ДЦ в рейтинге сети: 3 место из 12`, time:'Вчера'});
  } else if (role === 'distr' || role === 'owner') {
    notifs.push({type:'red', text:`🔴 Kaiyi Shymkent — скоринг упал до 34% (−15% за неделю)`, time:'Сейчас'});
    notifs.push({type:'orange', text:`📊 Kaiyi Astana — 8 лидов без контакта более 24 часов`, time:'Сегодня'});
    notifs.push({type:'green', text:`🏆 Лучший дилер недели: Kaiyi Karaganda (скоринг 82%)`, time:'Сегодня'});
    notifs.push({type:'blue', text:`📈 Еженедельный отчёт по сети готов`, time:'Пн 09:00'});
  }

  state.notifications = notifs;
  document.getElementById('notif-count').textContent = notifs.length;
}

  const list = document.getElementById('notif-list');

function clearNotifs() {

function funnelData(leads) {
  const statuses = ['Новый','В работе','Тест-драйв','КП','Контракт','Отказ'];
  return statuses.map(s => ({ status: s, count: leads.filter(l => l.status === s).length }));
}

function avgScore(leads) {
  if (!leads.length) return 0;
  return Math.round(leads.reduce((a,l) => a + scoreRl(l), 0) / leads.length);
}

function managerStats(managerName, leads) {
  const ml = leads.filter(l => l.manager === managerName);
  const contracts = ml.filter(l => l.status === 'Контракт').length;
  const td = ml.filter(l => l.testDrive).length;
  const kp = ml.filter(l => l.kp).length;
  const score = avgScore(ml);
  const conv = ml.length ? ((contracts/ml.length)*100).toFixed(1) : '0.0';
  const contact = ml.filter(l => l.lastContact).length;
  // composite manager score
  const ms = Math.min(100, Math.round(
    (contracts/Math.max(ml.length,1)*100)*0.35 +
    score*0.20 +
    (contact/Math.max(ml.length,1)*100)*0.15 +
    ((td+kp)/Math.max(ml.length*2,1)*100)*0.15 +
    Math.min(100, score)*0.10 +
    (ml.filter(l=>l.opd).length/Math.max(ml.length,1)*100)*0.05
  ));
  return { name:managerName, leads:ml.length, contracts, td, kp, score, conv, ms };
}

function dealerStats(dealerName, leads) {
  const dl = leads.filter(l => l.dealer === dealerName);
  const contracts = dl.filter(l => l.status === 'Контракт').length;
  const stuck = dl.filter(l => l.status === 'В работе').length;
  const score = avgScore(dl);
  const conv = dl.length ? ((contracts/dl.length)*100).toFixed(1) : '0.0';
  const managers = [...new Set(dl.map(l => l.manager))];
  return { name:dealerName, leads:dl.length, contracts, stuck, score, conv, managers: managers.length };
}

function colorFor(s) { return scoreColor(s); }

function scoreBar(score, showLabel=true) {
  const c = colorFor(score);
  return `<div class="lead-score">
    <div class="score-bar-bg"><div class="score-bar-fill" style="width:${score}%;background:${c}"></div></div>
    ${showLabel ? `<span class="score-label" style="color:${c}">${score}%</span>` : ''}
  </div>`;
}

function today() { return new Date().toISOString().slice(0,10); }

function statusBadge(s) {
  const cls = STATUS_MAP[s] || 'work';
  return `<span class="lead-status ${cls}">${s}</span>`;
}

//  MANAGER CALENDAR
// ═══════════════════════════════════════════════════════════════
function managerCalendar() {
  const u = state.user;
  const myLeads = state.leads.filter(l => l.manager === u.name && l.status !== 'Отказ' && l.status !== 'Контракт');
  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];

  // Build meetings from leads nextActionDate
  const meetings = state.meetings || [];
  const leadTasks = myLeads
    .filter(l => l.nextActionDate)
    .map(l => ({ id:'lead_'+l.id, date: l.nextActionDate, time:'', type: l.nextAction||'Звонок', client: l.client, phone: l.phone||'', leadId: l.id, fromLead: true }));

  const allEvents = [...meetings.filter(m => m.manager === u.name), ...leadTasks];
  allEvents.sort((a,b) => a.date.localeCompare(b.date));

  const todayEvents = allEvents.filter(e => e.date === todayStr);
  const upcomingEvents = allEvents.filter(e => e.date > todayStr).slice(0, 10);
  const overdueEvents = allEvents.filter(e => e.date < todayStr);

  // Calendar grid for current month
  const year = today.getFullYear(), month = today.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const startOffset = firstDay === 0 ? 6 : firstDay - 1;
  const monthNames = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const dayNames = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

  const eventDates = new Set(allEvents.map(e => e.date));

  let calCells = '';
  for (let i = 0; i < startOffset; i++) calCells += `<div class="cal-cell empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds === todayStr;
    const hasDot = eventDates.has(ds);
    calCells += `<div class="cal-cell ${isToday?'today':''}" onclick="showDayEvents('${ds}')">
      <span>${d}</span>
      ${hasDot ? '<div class="cal-dot"></div>' : ''}
    </div>`;
  }

  const typeIcon = t => t==='Встреча'?'🤝':t==='Тест-драйв'?'🚗':t==='КП'?'📄':'📞';

  return `
  <div class="section-header">
    <div class="section-title">📅 Мой календарь</div>
    <button class="btn-add-meeting" onclick="openMeetingModal()">+ Встреча</button>
  </div>

  <div class="card">
    <div class="cal-header">
      <span class="cal-month">${monthNames[month]} ${year}</span>
    </div>
    <div class="cal-grid-days">${dayNames.map(d=>`<div class="cal-day-name">${d}</div>`).join('')}</div>
    <div class="cal-grid">${calCells}</div>
  </div>

  ${overdueEvents.length ? `
  <div class="card">
    <div class="card-title" style="color:var(--red);">⚠️ Просрочено (${overdueEvents.length})</div>
    ${overdueEvents.map(e=>`
    <div class="event-item overdue">
      <div class="event-icon">${typeIcon(e.type)}</div>
      <div class="event-body">
        <div class="event-client">${e.client}</div>
        <div class="event-meta">${e.type} · ${e.date}${e.time?' · '+e.time:''}</div>
      </div>
      ${e.phone ? `<a class="wa-btn" href="https://wa.me/${(p=>p.startsWith('8')&&p.length===11?'7'+p.slice(1):p)(e.phone.replace(/[^0-9]/g,''))}" target="_blank">WA</a>` : ''}
    </div>`).join('')}
  </div>` : ''}

  <div class="card">
    <div class="card-title">📌 Сегодня${todayEvents.length?' ('+todayEvents.length+')':' — нет задач'}</div>
    ${todayEvents.length ? todayEvents.map(e=>`
    <div class="event-item today-event">
      <div class="event-icon">${typeIcon(e.type)}</div>
      <div class="event-body">
        <div class="event-client">${e.client}</div>
        <div class="event-meta">${e.type}${e.time?' · '+e.time:''}</div>
      </div>
      ${e.phone ? `<a class="wa-btn green" href="https://wa.me/${(p=>p.startsWith('8')&&p.length===11?'7'+p.slice(1):p)(e.phone.replace(/[^0-9]/g,''))}" target="_blank">WA</a>` : ''}
    </div>`).join('') : '<div style="color:var(--text2);font-size:13px;padding:8px 0;">Свободный день 🎉</div>'}
  </div>

  ${upcomingEvents.length ? `
  <div class="card">
    <div class="card-title">🗓 Предстоящие</div>
    ${upcomingEvents.map(e=>`
    <div class="event-item">
      <div class="event-icon">${typeIcon(e.type)}</div>
      <div class="event-body">
        <div class="event-client">${e.client}</div>
        <div class="event-meta">${e.type} · ${e.date}${e.time?' · '+e.time:''}</div>
      </div>
      ${e.phone ? `<a class="wa-btn" href="https://wa.me/${(p=>p.startsWith('8')&&p.length===11?'7'+p.slice(1):p)(e.phone.replace(/[^0-9]/g,''))}" target="_blank">WA</a>` : ''}
    </div>`).join('')}
  </div>` : ''}

  `;
}

function openMeetingModal() {
  // Populate leads dropdown dynamically
  const myLeads = state.leads.filter(l => l.manager === state.user.name && l.status !== 'Отказ' && l.status !== 'Контракт');
  const sel = document.getElementById('meet-lead');
  sel.innerHTML = `<option value="">— Выбрать из лидов —</option>
    ${myLeads.map(l=>`<option value="${l.id}" data-phone="${l.phone||''}" data-client="${l.client}">${l.client}</option>`).join('')}
    <option value="__new__">+ Новый клиент</option>`;
  // Set today's date
  document.getElementById('meet-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('meet-name-wrap').style.display = 'none';
  document.getElementById('meet-phone').value = '';
  document.getElementById('meet-note').value = '';
  document.getElementById('meeting-modal').style.display = 'flex';
}
function closeMeetingModal() {
  document.getElementById('meeting-modal').style.display = 'none';
}
function fillMeetingPhone() {
  const sel = document.getElementById('meet-lead');
  const opt = sel.options[sel.selectedIndex];
  const nameWrap = document.getElementById('meet-name-wrap');
  if (sel.value === '__new__') {
    nameWrap.style.display = 'block';
    document.getElementById('meet-phone').value = '';
  } else {
    nameWrap.style.display = 'none';
    document.getElementById('meet-phone').value = opt.dataset.phone || '';
  }
}
function saveMeeting(sendWA) {
  const leadId = document.getElementById('meet-lead').value;
  const sel = document.getElementById('meet-lead');
  const opt = sel.options[sel.selectedIndex];
  const isNew = leadId === '__new__';
  // Get client name: for new use input, for lead use data-client attr, fallback to option text
  const client = isNew
    ? document.getElementById('meet-name').value.trim()
    : (opt.getAttribute('data-client') || opt.text || '').trim();
  const phone = document.getElementById('meet-phone').value.trim();
  const type = document.getElementById('meet-type').value.replace(/^[\s\S]*?\s/, '').trim();
  const date = document.getElementById('meet-date').value;
  const time = document.getElementById('meet-time').value;
  const note = document.getElementById('meet-note').value.trim();

  if (!client || !date) { alert('Заполни клиента и дату'); return; }

  // Open WhatsApp FIRST — must be synchronous with user click
  if (sendWA && phone) {
    let cleanPhone = phone.replace(/[^0-9]/g,'');
    // KZ: replace leading 8 with 7 for international format
    if (cleanPhone.startsWith('8') && cleanPhone.length === 11) cleanPhone = '7' + cleanPhone.slice(1);
    const parts = date.split('-');
    const fmtDate = `${parts[2]}.${parts[1]}.${parts[0]}`;
    const timeStr = time ? ` в ${time}` : '';
    const noteStr = note ? `\n\nДополнительно: ${note}` : '';
    const text = `Здравствуйте, ${client}!\n\nНапоминаем, что у нас назначен${type==='Встреча'?'а':''} ${type.toLowerCase()} ${fmtDate}${timeStr}.\n\nЕсли есть вопросы - пишите. Ждём вас!\n\nС уважением,\n${state.user.name}\n${state.user.dealer}`;
    window.open(`https://api.whatsapp.com/send?phone=${cleanPhone}&text=${encodeURIComponent(text)}`, '_blank');
  }

  if (!state.meetings) state.meetings = [];
  const meeting = { id: 'mtg_'+Date.now(), manager: state.user.name, client, phone, type, date, time, note, leadId: isNew ? null : leadId };
  state.meetings.push(meeting);

  // Update lead nextAction if linked
  if (leadId && leadId !== '__new__') {
    const lead = state.leads.find(l => l.id === leadId);
    if (lead) { lead.nextAction = type; lead.nextActionDate = date; lead.lastContact = new Date().toISOString().split('T')[0]; }
    saveLeads();
  }
  try { localStorage.setItem('vmd_meetings', JSON.stringify(state.meetings)); } catch(e){}

  closeMeetingModal();
  buildNotifications();
  renderSidebar();
  renderApp();
  showToast(`✅ ${type} с ${client} на ${fmtDate||date}`, 'green');
}
function showDayEvents(dateStr) {
  const u = state.user;
  const myLeads = state.leads.filter(l => l.manager === u.name);
  const meetings = state.meetings ? state.meetings.filter(m => m.manager === u.name && m.date === dateStr) : [];
  const leadTasks = myLeads.filter(l => l.nextActionDate === dateStr).map(l => ({ type: l.nextAction||'Звонок', client: l.client, phone: l.phone||'', fromLead: true }));
  const all = [...meetings, ...leadTasks];
  const typeIcon = t => t==='Встреча'?'🤝':t==='Тест-драйв'?'🚗':t==='КП'?'📄':'📞';

  const modal = document.getElementById('day-modal');
  document.getElementById('day-modal-title').textContent = '📅 ' + dateStr;
  document.getElementById('day-modal-body').innerHTML = all.length
    ? all.map(e=>`<div class="event-item" style="margin-bottom:10px;">
        <div class="event-icon">${typeIcon(e.type)}</div>
        <div class="event-body"><div class="event-client">${e.client}</div><div class="event-meta">${e.type}${e.time?' · '+e.time:''}</div></div>
        ${e.phone ? `<a class="wa-btn green" href="https://wa.me/${(p=>p.startsWith('8')&&p.length===11?'7'+p.slice(1):p)(e.phone.replace(/[^0-9]/g,''))}" target="_blank">WA</a>` : ''}
      </div>`).join('')
    : '<div style="color:var(--text2);text-align:center;padding:16px;">Нет событий в этот день</div>';
  modal.style.display = 'flex';
}

// ═══════════════════════════════════════════════════════════════
//  CSV PARSER
// ═══════════════════════════════════════════════════════════════
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) parseCSVFile(file);
}

function handleCSV(e) {
  const file = e.target.files[0];
  if (file) parseCSVFile(file);
}

function parseCSVFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const text = e.target.result;
      const lines = text.split('\n').filter(l => l.trim());
      const headers = lines[0].split(',').map(h => h.trim().replace(/"/g,''));
      const leads = [];
      for (let i=1; i<lines.length; i++) {
        const vals = lines[i].split(',').map(v => v.trim().replace(/"/g,''));
        const row = {};
        headers.forEach((h,j) => row[h] = vals[j]||'');
        const lead = {
          id:           row['ID']||`RL-${i}`,
          date:         row['Дата']||'',
          client:       row['Клиент']||row['ФИО']||'Неизвестно',
          phone:        row['Телефон']||null,
          manager:      row['Менеджер']||'',
          dealer:       row['Дилер']||row['ДЦ']||'',
          status:       row['Статус']||'Новый',
          model:        row['Модель']||null,
          modification: row['Модификация']||null,
          color:        row['Цвет']||null,
          opd:          (row['ОПД']||'').toLowerCase()==='да'||row['ОПД']==='1'||row['ОПД']==='true',
          testDrive:    row['Дата_ТД']||null,
          kp:           row['Дата_КП']||null,
          source:       row['Источник']||null,
          nextAction:   row['Следующее_действие']||null,
          nextActionDate: row['Дата_след_действия']||null,
          lastContact:  row['Последний_контакт']||null,
        };
        if (lead.client && lead.client !== 'Неизвестно') leads.push(lead);
      }
      if (leads.length) {
        state.leads = leads;
        buildNotifications();
        alert(`✅ Загружено ${leads.length} рабочих листов из DNM`);
        switchTab(0);
      } else {
        alert('❌ Не удалось прочитать данные. Проверь формат CSV.');
      }
    } catch(err) {
      alert('❌ Ошибка: ' + err.message);
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function closeModal(e) {

// ═══════════════════════════════════════════════════════════════
//  CHARTS
// ═══════════════════════════════════════════════════════════════
function initCharts() {
  const role = state.user?.role;
  const myDealer = state.user?.dealer;
  const all = state.leads;
  const dcLeads = all.filter(l => l.dealer === myDealer);

  // Funnel helper
  function drawFunnel(elId, leads) {
    const el = document.getElementById(elId);
    if (!el) return;
    const statuses = ['Новый','В работе','Тест-драйв','КП','Контракт','Отказ'];
    const colors   = ['#1565C0','#00B0FF','#2E7D32','#6A1B9A','#00C853','#D32F2F'];
    const maxCount = Math.max(...statuses.map(s => leads.filter(l=>l.status===s).length), 1);
    el.innerHTML = statuses.map((s,i) => {
      const count = leads.filter(l=>l.status===s).length;
      const pct = Math.round(count/maxCount*100);
      return `<div class="funnel-row">
        <span class="funnel-label">${s}</span>
        <div class="funnel-bar-wrap">
          <div class="funnel-bar" style="width:${pct}%;background:${colors[i]}">${pct>15?count:''}</div>
        </div>
        <span class="funnel-count">${count}</span>
      </div>`;
    }).join('');
  }

  if (document.getElementById('my-funnel'))  drawFunnel('my-funnel', all.filter(l=>l.manager===state.user.name));
  if (document.getElementById('rop-funnel')) drawFunnel('rop-funnel', dcLeads);
  if (document.getElementById('dir-funnel')) drawFunnel('dir-funnel', dcLeads);
  if (document.getElementById('net-funnel')) drawFunnel('net-funnel', all);

  // Model chart
  const modelEl = document.getElementById('model-chart');
  if (modelEl) {
    const models = {};
    all.forEach(l => { const m = l.model||'Не указан'; models[m]=(models[m]||0)+1; });
    const sorted = Object.entries(models).sort((a,b)=>b[1]-a[1]);
    state.chartInstances['model'] = new Chart(modelEl, {
      type:'bar',
      data: { labels: sorted.map(x=>x[0]), datasets:[{ data: sorted.map(x=>x[1]), backgroundColor:'#1565C0', borderRadius:4 }] },
      options:{ responsive:true, plugins:{legend:{display:false}}, scales:{ y:{beginAtZero:true, ticks:{stepSize:1}}, x:{ticks:{font:{size:10}}} } }
    });
  }

  // Dealer score chart
  const dealerEl = document.getElementById('dealer-chart');
  if (dealerEl) {
    const dealers = [...new Set(all.map(l=>l.dealer))].map(d => dealerStats(d, all)).sort((a,b)=>b.score-a.score);
    state.chartInstances['dealer'] = new Chart(dealerEl, {
      type:'bar',
      data: {
        labels: dealers.map(d=>d.name.replace('Kaiyi ','')),
        datasets:[{ data: dealers.map(d=>d.score), backgroundColor: dealers.map(d=>scoreColor(d.score)), borderRadius:4 }]
      },
      options:{ responsive:true, plugins:{legend:{display:false}}, scales:{ y:{beginAtZero:true, max:100, ticks:{callback:v=>v+'%'}}, x:{ticks:{font:{size:10}}} } }
    });
  }
}

// ═══════════════════════════════════════════════════════════════
//  AUTO-REFRESH SIMULATION (every 10 min shows toast)
// ═══════════════════════════════════════════════════════════════
function showToast(msg, type='blue') {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:${type==='green'?'#2E7D32':type==='red'?'#D32F2F':'#1565C0'};color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.2);`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// Simulate new lead notification after 15 seconds
setTimeout(() => {
  if (state.user) {
    state.notifications.unshift({type:'green', text:'🆕 Новый рабочий лист создан в DNM: <strong>Бауыржан Тəуекел</strong> — Kaiyi Astana', time:'Только что'});
    document.getElementById('notif-count').textContent = state.notifications.length;
    showToast('🆕 Новый РЛ создан в DNM — Kaiyi Astana', 'green');

}, 15000);

// Simulate 10-min sync
setInterval(() => {
  if (state.user) showToast('🔄 Данные обновлены из DNM');
}, 600000);
